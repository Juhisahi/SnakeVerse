<!DOCTYPE html>
<html lang="en">



<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>



<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>Highest Score: <span id="high-score">0</span></h3>
                </div>
                <div class="info">
                    <h3>Current Score: <span id="score">0</span></h3>
                </div>
                <div class="info">
                    <h3>Time: <span id="time">00:00</span></h3>
                </div>
            </div>
            <div class="board"></div>
        </section>

        <div class="modal">
            <div class="start-game">
                <h3>Welcome to the Snake Game</h3>
                <button class="btn-start">Start Game</button>
            </div>
            <div class="game-over">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Restart Game</button>
            </div>
        </div>
        <div class="controls" aria-hidden="true">
            <div class="pad">
                <button class="ctrl btn-up">▲</button>
                <div class="ctrl-row">
                    <button class="ctrl btn-left">◀</button>
                    <button class="ctrl btn-right">▶</button>
                </div>
                <button class="ctrl btn-down">▼</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
